server:
  port: 8083

spring:
  application:
    name: transfer-service

  datasource:
    url: jdbc:h2:mem:transferdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

# URL других микросервисов
provider:
  service:
    url: ${PROVIDER_SERVICE_URL:http://localhost:8082}

logging:
  level:
    ru.nsu.melody_shift.transfer: DEBUG
    org.springframework.web: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
