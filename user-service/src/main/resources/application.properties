# Server Configuration
server.port=8081
spring.application.name=user-service

# ===== Database Configuration =====
spring.datasource.url=jdbc:h2:mem:userdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# PostgreSQL Configuration
#spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
#spring.datasource.username=postgres
#spring.datasource.password=PASSWORD
#spring.datasource.driver-class-name=org.postgresql.Driver
#spring.jpa.database=postgresql
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
#spring.jpa.hibernate.ddl-auto=update

# ===== JWT Configuration =====
jwt.secret=${JWT_SECRET:your-very-long-secret-key-for-jwt-token-generation-minimum-256-bits-required-for-hs256-algorithm}
jwt.expiration-ms=86400000

# ===== OAuth2 Spotify Configuration =====
spring.security.oauth2.client.registration.spotify.client-id=${SPOTIFY_CLIENT_ID:your-spotify-client-id}
spring.security.oauth2.client.registration.spotify.client-secret=${SPOTIFY_CLIENT_SECRET:your-spotify-client-secret}
spring.security.oauth2.client.registration.spotify.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.spotify.redirect-uri={baseUrl}/api/oauth/spotify/callback
spring.security.oauth2.client.registration.spotify.scope=user-read-email,playlist-read-private,playlist-read-collaborative,playlist-modify-private,playlist-modify-public

spring.security.oauth2.client.provider.spotify.authorization-uri=https://accounts.spotify.com/authorize
spring.security.oauth2.client.provider.spotify.token-uri=https://accounts.spotify.com/api/token
spring.security.oauth2.client.provider.spotify.user-info-uri=https://api.spotify.com/v1/me
spring.security.oauth2.client.provider.spotify.user-name-attribute=id

# ===== Yandex OAuth Configuration =====
yandex.client-id=${YANDEX_CLIENT_ID:23cabbbdc6cd418abb4b39c32c41195d}
yandex.client-secret=${YANDEX_CLIENT_SECRET:your-yandex-client-secret}
yandex.redirect-uri=http://localhost:8081/api/oauth/yandex/callback

# ===== Logging =====
logging.level.ru.nsu.melody_shift=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ===== Error Handling =====
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
