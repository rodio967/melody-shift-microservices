# Server Configuration
server.port=8081
spring.application.name=user-service

# ===== Database Configuration =====
spring.datasource.url=jdbc:h2:mem:userdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# PostgreSQL Configuration
#spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
#spring.datasource.username=postgres
#spring.datasource.password=PASSWORD
#spring.datasource.driver-class-name=org.postgresql.Driver
#spring.jpa.database=postgresql
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
#spring.jpa.hibernate.ddl-auto=update

# ===== JWT Configuration =====
jwt.secret=${JWT_SECRET:your-very-long-secret-key-for-jwt-token-generation-minimum-256-bits-required-for-hs256-algorithm}
jwt.expiration-ms=86400000

# ===== OAuth2 Spotify Configuration =====
spotify.client-id=${SPOTIFY_CLIENT_ID:your-spotify-client-id}
spotify.client-secret=${SPOTIFY_CLIENT_SECRET:your-spotify-client-secret}
spotify.redirect-uri=${SPOTIFY_REDIRECT_URI:http://localhost:8081/api/oauth/spotify/callback}

# ===== Yandex OAuth Configuration =====
yandex.client-id=${YANDEX_CLIENT_ID:your-yandex-client-id}
yandex.client-secret=${YANDEX_CLIENT_SECRET:your-yandex-client-secret}
yandex.redirect-uri=http://localhost:8081/api/oauth/yandex/callback

# ===== Logging =====
logging.level.ru.nsu.melody_shift=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=WARN

# ===== Error Handling =====
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
